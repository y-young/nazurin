name: Ruff

on:
  push:
    branches: [master]
    paths:
      - "nazurin/**"
      - ".github/workflows/ruff.yaml"
  pull_request:
    types: [opened, reopened, synchronize, edited]
    branches: [master]
    paths:
      - "nazurin/**"
      - ".github/workflows/ruff.yaml"

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3
